# codemagic.yaml
workflows:
  android-workflow:
    name: Build & Sign APK
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      groups:
        - android_signing
      vars:
        PACKAGE_NAME: "com.pyramic.samsungsmarttv"

    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Analyze code
        script: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Setup keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/mando_key.jks

      - name: Build release APK
        script: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=1

      - name: Sign APK
        script: |
          $ANDROID_SDK_ROOT/build-tools/*/apksigner sign \
            --ks $CM_BUILD_DIR/mando_key.jks \
            --ks-pass pass:$CM_KEYSTORE_PASSWORD \
            --ks-key-alias $CM_KEY_ALIAS \
            --key-pass pass:$CM_KEY_PASSWORD \
            --out build/app/outputs/flutter-apk/app-release-signed.apk \
            build/app/outputs/flutter-apk/app-release.apk

      - name: Build release AAB
        script: |
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=1

    artifacts:
      - build/app/outputs/flutter-apk/app-release-signed.apk
      - build/app/outputs/bundle/release/app-release.aab

    publishing:
      email:
        recipients:
          - miosegundamano7@gmail.com
        notify:
          success: true
          failure: true
